<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Precision Finance - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#b2c9fe",
                        "surface-container-highest": "#e1e3e4",
                        "inverse-primary": "#adc7ff",
                        "on-tertiary-container": "#0e0200",
                        "tertiary-fixed-dim": "#ffb691",
                        "on-primary-fixed-variant": "#004493",
                        "surface": "#f8f9fa",
                        "primary-container": "#1a73e8",
                        "on-primary-container": "#ffffff",
                        "on-background": "#191c1d",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#341100",
                        "surface-bright": "#f8f9fa",
                        "tertiary": "#9e4300",
                        "on-secondary": "#ffffff",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "on-surface-variant": "#414754",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#2e4673",
                        "background": "#f8f9fa",
                        "on-secondary-container": "#3d5481",
                        "surface-container-low": "#f3f4f5",
                        "primary": "#005bbf",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary-fixed-variant": "#783100",
                        "tertiary-container": "#c55500",
                        "secondary": "#475e8c",
                        "primary-fixed-dim": "#adc7ff",
                        "inverse-surface": "#2e3132",
                        "surface-variant": "#e1e3e4",
                        "outline": "#727785",
                        "outline-variant": "#c1c6d6",
                        "on-secondary-fixed": "#001a41",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-dim": "#d9dadb",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#001a41",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed": "#ffdbcb",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#d8e2ff",
                        "surface-tint": "#005bc0",
                        "secondary-fixed-dim": "#afc7fb",
                        "on-tertiary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Suppressed for Transactional Page following Protocol -->
<header class="fixed top-0 w-full z-50 bg-[#f8f9fa] opacity-80 backdrop-blur-md flex items-center justify-between px-4 h-14 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#1A73E8]">arrow_back</span>
<h1 class="font-manrope title-sm font-semibold tracking-tight text-lg font-bold text-[#191c1d]">Precision Finance</h1>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-20 pb-12">
<div class="w-full max-w-[400px]">
<!-- Hero Texture for Context -->
<div class="mb-8 overflow-hidden rounded-xl bg-surface-container-low h-24 flex items-end p-4 relative" data-alt="abstract geometric pattern with blue and white interlocking shapes representing precision and structural integrity in finance">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/10 to-transparent"></div>
<div class="relative z-10">
<h2 class="text-on-surface font-headline font-bold text-xl tracking-tight">Create Account</h2>
<p class="text-on-surface-variant font-label label-md">Access your Kinetic Ledger today.</p>
</div>
</div>
<!-- Form Section -->
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-[0px_12px_32px_rgba(25,28,29,0.06)]">
<form class="space-y-4">
<!-- Name Field -->
<div class="space-y-1.5">
<label class="block font-label label-sm font-medium text-on-surface-variant" for="name">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg py-2.5 px-4 text-body-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none" id="name" name="name" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label label-sm font-medium text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg py-2.5 px-4 text-body-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block font-label label-sm font-medium text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg py-2.5 px-4 text-body-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none" id="password" name="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-2">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low" id="terms" name="terms" type="checkbox"/>
</div>
<label class="text-label-sm text-on-surface-variant leading-tight" for="terms">
                            By creating an account, I agree to the <span class="text-primary font-semibold">Terms of Service</span> and <span class="text-primary font-semibold">Privacy Policy</span>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-br from-primary-container to-primary text-on-primary font-label font-bold py-3 px-4 rounded-lg active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2 mt-2" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/15 text-center">
<p class="text-label-md text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-bold ml-1" href="#">Log in</a>
</p>
</div>
</section>
<!-- Metadata/Security Badges -->
<div class="mt-8 flex justify-center items-center gap-6 opacity-40">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="text-[10px] font-bold uppercase tracking-widest">256-bit AES</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest">SIPC Insured</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Suppressed for Transactional Page following Protocol -->
</body></html>
