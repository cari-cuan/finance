<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                        "surface-bright": "#f8f9fa",

                        "tertiary-fixed": "#ffdbcb",
                        "inverse-on-surface": "#f0f1f2",
                        "on-primary-fixed": "#001a41",

                        "on-primary": "#ffffff",

                        "surface-container-high": "#e7e8e9",

        }

<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #1a73e8 0%, #005bbf 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<!-- Suppressed Shell: As per rules for Transactional/Login pages, TopAppBar and BottomNavBar are omitted -->
<main class="flex-grow flex items-center justify-center p-6 sm:p-12 relative overflow-hidden">
<!-- Background Decoration (Kinetic Ledger Style) -->
<div class="absolute top-0 right-0 -mr-24 -mt-24 w-96 h-96 bg-primary-fixed/20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-0 left-0 -ml-24 -mb-24 w-80 h-80 bg-secondary-fixed/20 blur-[80px] rounded-full"></div>
<div class="w-full max-w-[400px] z-10">
<!-- Brand Anchor -->
<div class="mb-10 flex flex-col items-center text-center">
<div class="w-12 h-12 bg-primary flex items-center justify-center rounded-xl mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<h1 class="text-on-surface font-extrabold text-2xl tracking-tight mb-1">Metric Ledger</h1>
<p class="text-on-surface-variant font-label text-[13px]">Precision data for modern finance.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(25,28,29,0.04)] p-8 border border-outline-variant/15">
<div class="mb-6">
<h2 class="text-on-surface font-bold text-lg mb-1">Welcome Back</h2>
<p class="text-on-surface-variant text-[13px]">Enter your credentials to access your account.</p>
</div>
<form class="space-y-4">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-on-surface-variant text-xs font-semibold uppercase tracking-wider pl-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-low border-0 rounded-lg py-2.5 pl-10 pr-4 text-[13px] text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none placeholder:text-outline" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex items-center justify-between px-1">
<label class="text-on-surface-variant text-xs font-semibold uppercase tracking-wider" for="password">Password</label>
<a class="text-primary text-[11px] font-bold hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low border-0 rounded-lg py-2.5 pl-10 pr-4 text-[13px] text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer hover:text-on-surface transition-colors">visibility</span>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center space-x-2 pt-1">
<input class="w-4 h-4 rounded-md border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low" id="remember" type="checkbox"/>
<label class="text-on-surface-variant text-[12px] font-medium cursor-pointer" for="remember">Remember this device</label>
</div>
<!-- Primary CTA -->
<button class="w-full kinetic-gradient text-on-primary font-bold py-3 px-4 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all text-sm mt-4 flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Social Login Separator -->
<div class="relative my-8 text-center">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/15"></div>
</div>
<span class="relative bg-surface-container-lowest px-3 text-[11px] text-outline font-bold uppercase tracking-widest">Or continue with</span>
</div>
<!-- Secondary Auth -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface font-semibold py-2 px-4 rounded-lg text-[12px] hover:bg-surface-container-highest transition-colors active:opacity-80">
<img alt="Google Logo" class="w-4 h-4" data-alt="clean minimalist google logo icon for social login integration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBkiO2L3oHP178_2uOYgTi0U8Km2HkVgMzLzEfmq5iPSdMyNvhOou6Fr5JH_d3H35GWIPy5yXOVmNh21q0tawM9zlC9M3CfydZVAoGRauPH_lEfGcoIakgyXA8U9z_da_L5OmyAXrJs6UA2P4hleaveACoVQFhrfpIRhsiLBE1Tgen9FbT0PePfQHFvq3Gb12g-gptzAaDvmSlNpAa05cLStzmpdz3TlT_XhaLIXDKcwee-k8M7cwkDzFPF3RvxuO6RZCvya-ow0k"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface font-semibold py-2 px-4 rounded-lg text-[12px] hover:bg-surface-container-highest transition-colors active:opacity-80">
<span class="material-symbols-outlined text-[18px]">key</span>
                        Passkey
                    </button>
</div>
</div>
<!-- Registration Footer -->
<p class="text-center mt-8 text-[13px] text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Register for Metric Ledger</a>
</p>
<!-- Legal Links -->
<div class="mt-16 flex justify-center gap-6 text-[11px] text-outline font-medium">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</main>
<!-- Visual Identity Strip -->
<div class="h-1 kinetic-gradient w-full fixed bottom-0"></div>
</body></html>
