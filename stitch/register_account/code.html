        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;

        .glass-header {
            background: rgba(248, 249, 250, 0.8);

        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<!-- Suppressed TopAppBar for Transactional/Focused Screen as per Protocol -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[420px] space-y-8">
<!-- Brand & Heading -->
<div class="text-center space-y-2">
<div class="inline-flex items-center justify-center w-12 h-12 bg-primary-container/10 rounded-xl mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<h1 class="text-on-surface font-extrabold text-2xl tracking-tight">Create Your Account</h1>
<p class="text-on-surface-variant text-sm font-medium">Join Metric Ledger for high-velocity precision finance.</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0px_12px_32px_rgba(25,28,29,0.04)]">
<form class="space-y-5">
<!-- Name Field -->
<div class="space-y-1.5">
<label class="block text-on-surface-variant font-semibold text-[11px] uppercase tracking-wider" for="name">Full Name</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg" data-icon="person">person</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface-container-low border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-on-surface-variant font-semibold text-[11px] uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface-container-low border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block text-on-surface-variant font-semibold text-[11px] uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-10 py-2.5 bg-surface-container-low border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-outline" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
<p class="text-[10px] text-on-surface-variant px-1">Must be at least 8 characters with a symbol.</p>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-2.5 py-1">
<input class="mt-0.5 rounded-sm border-outline-variant text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-[11px] leading-tight text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full kinetic-gradient text-on-primary font-bold py-3 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all text-sm tracking-wide" type="submit">
                        Create Account
                    </button>
</form>
<!-- Social Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t border-outline-variant/15"></div>
<span class="mx-3 text-[10px] font-bold text-outline-variant uppercase tracking-widest">Or Register With</span>
<div class="flex-grow border-t border-outline-variant/15"></div>
</div>
<!-- Social Grid -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 bg-surface-container-high rounded-lg hover:bg-surface-container-highest transition-colors active:scale-[0.98]">
<img alt="" class="w-4 h-4" data-alt="Google colorful G logo icon on transparent background representing third-party authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcJ4kPZgyzX5N4Ct165ZGdEMcWEC5m5G_tOfasyAAxzVDfqwpu-Wx0qLonYE4fzuAwyhVH5yOezjWDCPAiraW2xa1WFORK_NCr4gHTtPLZaz74MQ_0W6jpE0cP8SMPw5xm_dL1fqShrYggkackdyPHBvHdW3oQzjuixHUJMyIkn7KTR-De0ETQrxVY6s7RGV1xpvcPl7TlaRQbs4nIyMpBgPmlT2xxbiClOJcN_I1hHLl16AbHbm7VHkZTH45SxyFNz1st2vo--Os"/>
<span class="text-[12px] font-bold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2.5 bg-surface-container-high rounded-lg hover:bg-surface-container-highest transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-on-surface text-lg" data-icon="apple">ios</span>
<span class="text-[12px] font-bold text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center text-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="/login">Log in</a>
</p>
<!-- Secondary Decorative Graphic (Asymmetric Layout element) -->
<div class="hidden lg:block fixed bottom-12 right-12 w-64 h-64 opacity-10 pointer-events-none">
<div class="absolute inset-0 kinetic-gradient rounded-full blur-3xl"></div>
<div class="relative p-8 border border-primary/20 rounded-2xl transform rotate-12">
<span class="material-symbols-outlined text-[120px] text-primary" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
</div>
</div>
</main>
<!-- Contextual Footer -->
<footer class="py-6 px-4 text-center">
<p class="text-[10px] text-outline uppercase tracking-[0.2em] font-medium">Metric Ledger © 2024 • Institutional Grade Precision</p>
</footer>
</body></html>
