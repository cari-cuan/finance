        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor - Suppressed based on transactional intent rule -->
<!-- Content starts here -->
<main class="flex-grow flex items-center justify-center p-8 md:p-12">
<div class="w-full max-w-[420px] flex flex-col gap-10">
<!-- Brand Identity -->
<div class="flex flex-col gap-2">
<div class="flex items-center gap-3">
<div class="w-10 h-10 primary-gradient rounded-md flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white" data-icon="auto_awesome">auto_awesome</span>
</div>
<span class="font-headline font-extrabold text-2xl tracking-tighter text-on-surface">Lumina</span>
</div>
<div class="mt-4">
<h1 class="font-headline font-bold text-2xl tracking-tight text-on-surface">Mulai langkah finansialmu</h1>
<p class="font-body text-sm text-on-surface-variant/70 mt-1">Lengkapi data untuk membuat akun baru.</p>
</div>
</div>
<!-- Registration Form Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0px_24px_48px_rgba(25,28,29,0.04)]">
<form class="flex flex-col gap-5">
<!-- Form Fields: Compact & Minimal Radius -->
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="font-label font-medium text-[0.6875rem] uppercase tracking-widest text-on-surface-variant/80 ml-1" for="name">Nama Lengkap</label>
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-sm font-body focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200" id="name" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label font-medium text-[0.6875rem] uppercase tracking-widest text-on-surface-variant/80 ml-1" for="email">Email</label>
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-sm font-body focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label font-medium text-[0.6875rem] uppercase tracking-widest text-on-surface-variant/80 ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-sm font-body focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label font-medium text-[0.6875rem] uppercase tracking-widest text-on-surface-variant/80 ml-1" for="confirm-password">Konfirmasi Password</label>
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-sm font-body focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 px-1 mt-1">
<input class="mt-0.5 rounded-sm border-outline-variant text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="font-body text-[0.75rem] leading-relaxed text-on-surface-variant" for="terms">
                            Saya menyetujui <a class="text-primary font-medium underline underline-offset-2" href="#">Syarat &amp; Ketentuan</a> dan <a class="text-primary font-medium underline underline-offset-2" href="#">Kebijakan Privasi</a> Lumina.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full primary-gradient text-on-primary font-body font-semibold text-sm py-4 rounded-md shadow-md shadow-primary/20 active:scale-[0.98] transition-all duration-150 mt-2" type="submit">
                        Daftar
                    </button>
</form>
</div>
<!-- Footer Link -->
<div class="flex flex-col items-center gap-6">
<p class="font-body text-sm text-on-surface-variant">
                    Sudah punya akun? <a class="text-primary font-semibold hover:text-primary-container transition-colors" href="/login">Login</a>
</p>
<!-- Social Proof / Aesthetic Element -->
<div class="flex items-center gap-4 w-full">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-outline-variant">Trusted Security</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
</div>
</div>
</main>
<!-- Side Image Decor (Hidden on mobile) -->
<div class="hidden lg:block fixed right-0 top-0 bottom-0 w-1/3 p-12">
<div class="w-full h-full rounded-lg overflow-hidden relative group">
<img class="w-full h-full object-cover grayscale opacity-40 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700" data-alt="Modern abstract glass sculpture with blue and white highlights, representing financial transparency and digital growth in a clean architectural space" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrpCOa0wmun3xaidxSAA6nVnEKX1tz4a8poD7Swh7VRCMo06tM0rsgCq6aKR5D4XMgUOoOzv05Zul3l1simZ_JcYwNu6wk5lt5FvcQ9UEF4QXDzUOfzm0aN2jBUoWyvyS6s34qiARTcR9CDuIr8YwRt-MJAqHUsdd-5xS2GISt8IXu6ytFlExMsMETqZR_xTm1gLYF56V2GvxA8B-KH-BQ4qnveeUS7sdAC15TckZOGdHRxPZW7uzcqLTMrra-soXtUw8AcMj3RXs"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-60"></div>
<div class="absolute bottom-12 left-12 right-12">
<p class="font-headline font-medium text-lg leading-snug text-on-surface opacity-80">
                    "Platform manajemen finansial paling intuitif yang pernah saya gunakan."
                </p>
<p class="font-label text-xs uppercase tracking-widest text-primary mt-4 font-bold">— Financial Times Review</p>
</div>
</div>
</div>
</body></html>
