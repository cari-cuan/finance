<body class="bg-surface dark:bg-slate-900 text-on-surface transition-colors duration-300">
<!-- Suppressing Shared Nav Shell as per Task-Focused/Transactional rule -->
<main class="min-h-screen flex items-center justify-center p-8">
<div class="w-full max-w-[400px] flex flex-col gap-10">
<!-- Branding/Identity -->
<header class="flex flex-col gap-3">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-gradient-to-br from-primary-container to-primary rounded-[8px] flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<span class="text-2xl font-extrabold tracking-tight text-on-surface dark:text-slate-100">Lumina Finance</span>
</div>
<div class="flex flex-col gap-1">
<h1 class="text-xl font-bold tracking-tight text-on-surface dark:text-slate-200">Welcome Back</h1>
<p class="text-sm text-on-surface-variant font-body opacity-80">Log in to manage your digital assets securely.</p>
</div>
</header>
<!-- Login Form -->
<div class="bg-surface-container-lowest dark:bg-slate-800 rounded-[8px] p-6 shadow-[0px_24px_48px_rgba(25,28,29,0.04)] dark:shadow-none">
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-[0.6875rem] font-semibold tracking-[0.05em] uppercase text-on-surface-variant" for="email">Email/Username</label>
<div class="relative group">
<input class="w-full bg-surface-container-low dark:bg-slate-700/50 border-none rounded-[8px] px-4 py-3 text-sm focus:ring-2 focus:ring-primary-container transition-all text-on-surface dark:text-slate-200 placeholder:text-on-surface-variant/40" id="email" placeholder="Enter your email" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label text-[0.6875rem] font-semibold tracking-[0.05em] uppercase text-on-surface-variant" for="password">Password</label>
<a class="text-[0.6875rem] font-medium text-primary-container hover:underline tracking-[0.02em]" href="#">Lupa Password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low dark:bg-slate-700/50 border-none rounded-[8px] px-4 py-3 text-sm focus:ring-2 focus:ring-primary-container transition-all text-on-surface dark:text-slate-200 placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="mt-2 w-full bg-gradient-to-br from-primary-container to-primary text-on-primary py-3.5 rounded-[8px] font-semibold text-sm tracking-wide shadow-md active:scale-[0.98] transition-all duration-150" type="submit">
                        Masuk
                    </button>
</form>
<!-- Social/Other -->
<div class="mt-8 flex flex-col gap-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-surface-container-lowest dark:bg-slate-800 px-3 text-on-surface-variant/60 font-label tracking-widest uppercase">Quick Connect</span>
</div>
</div>
<div class="flex gap-4">
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-[8px] bg-surface-container-low dark:bg-slate-700 hover:bg-surface-container-high dark:hover:bg-slate-600 transition-colors">
<img alt="Google" class="w-4 h-4" data-alt="minimalist flat vector google logo icon with primary brand colors on clear white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuASRcYLe5rpZGIPRkuzXOkJuA8tCJppElpN4NP_lw6Ox1JLzqke4jeaS_CpIehp2eievfhDaO8T_5r8okXRZnvPXVdbyVBrlKcQRQoBs_9jV36IOzEe3HXFcEjvlJT5An5ukQTGO0mf9U4iJcZEWv1F4QvqVJfz1a6grdeXZSqpJThX_ZpyY3g6Y3yvj8uNiGQcgcOW_-w96blzPOEmFcU_zp_hMKjgVzydxKrdsQn1KExFd5u3km4kD7sLzkeNo_J0NDssBQHE7NU"/>
</button>
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-[8px] bg-surface-container-low dark:bg-slate-700 hover:bg-surface-container-high dark:hover:bg-slate-600 transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
</div>
<!-- Footer Links -->
<footer class="flex flex-col items-center gap-4">
<p class="text-sm text-on-surface-variant">
                    Belum punya akun? 
                    <a class="font-semibold text-primary-container hover:underline ml-1" href="#">Daftar</a>
</p>
<div class="flex gap-4 items-center opacity-40">
<span class="text-[10px] font-label tracking-widest uppercase">Encrypted</span>
<span class="w-1 h-1 bg-on-surface-variant rounded-full"></span>
<span class="text-[10px] font-label tracking-widest uppercase">Compliant</span>
<span class="w-1 h-1 bg-on-surface-variant rounded-full"></span>
<span class="text-[10px] font-label tracking-widest uppercase">Secure</span>
</div>
</footer>
</div>
</main>
<!-- Visual Background Element -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-full overflow-hidden hidden lg:block">
<div class="absolute top-1/4 -right-1/4 w-[600px] h-[600px] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-1/4 w-[400px] h-[400px] bg-secondary-container/5 rounded-full blur-[100px]"></div>
</div>
